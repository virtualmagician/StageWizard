name: StageWizard
options:
  bundleIdPrefix: com.marcotempest
  deploymentTarget:
    macOS: "26.1"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    ENABLE_HARDENED_RUNTIME: false
    DEAD_CODE_STRIPPING: true

targets:
  StageWizard:
    type: application
    platform: macOS
    dependencies:
      - target: StageWizardCamera
        embed: true
        codeSign: true
    entitlements:
      path: Support/StageWizard.entitlements
      properties:
        com.apple.security.automation.apple-events: true
        # Hardened runtime refuses camera access outright (no prompt, no TCC)
        # without this — dev builds were unhardened so it went unnoticed.
        com.apple.security.device.camera: true
    sources:
      - path: Sources
        excludes:
          - CameraExtension
      - path: Support/AppIcon.icns
        buildPhase: resources
      - path: Support/DocIcon.icns
        buildPhase: resources
      - path: Support/Credits.rtf
        buildPhase: resources
      - path: Support/presets
        type: folder
        buildPhase: resources
    postBuildScripts:
      # The repo lives under Dropbox (File Provider), which tags build
      # products with xattrs that codesign rejects as "detritus". Strip them
      # right before signing.
      - script: 'xattr -cr "${CODESIGNING_FOLDER_PATH}" 2>/dev/null || true'
        name: Strip cloud-sync xattrs before codesign
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.marcotempest.stagewizard
    info:
      path: Support/Info.plist
      properties:
        CFBundleName: StageWizard
        CFBundleDisplayName: StageWizard
        CFBundleIconFile: AppIcon
        NSCameraUsageDescription: StageWizard shows live camera input on stage displays through Camera cues.
        NSAppleEventsUsageDescription: StageWizard asks PowerPoint or Keynote to export presentation decks so slides can become cues.
        CFBundleShortVersionString: "1.4.0"
        CFBundleVersion: "6"
        LSApplicationCategoryType: public.app-category.entertainment
        LSMinimumSystemVersion: "26.1"
        NSHumanReadableCopyright: "© 2026 MagicLab AG"
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false
        CFBundleDocumentTypes:
          - CFBundleTypeName: StageWizard Show
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            CFBundleTypeIconFile: DocIcon
            LSItemContentTypes:
              - com.marcotempest.stagewizard.show
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.marcotempest.stagewizard.show
            UTTypeDescription: StageWizard Show
            UTTypeIconFile: DocIcon.icns
            UTTypeConformsTo:
              - public.json
            UTTypeTagSpecification:
              public.filename-extension:
                - stagewizard
          - UTTypeIdentifier: com.marcotempest.stagewizard.cues
            UTTypeDescription: StageWizard Cues
            UTTypeConformsTo:
              - public.json

  StageWizardCamera:
    type: system-extension
    platform: macOS
    sources:
      - Sources/CameraExtension
    entitlements:
      path: Support/CameraExtension.entitlements
      properties:
        com.apple.security.app-sandbox: true
        # Grants the sandboxed extension the mach namespace for its
        # CMIOExtensionMachServiceName (same pattern as every shipping
        # virtual camera) — without it the cmio category validator fails.
        com.apple.security.application-groups:
          - Z3U3NKMU2Y.com.marcotempest.stagewizard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.marcotempest.stagewizard.camera
        # The extension finder matches bundles NAMED by their identifier
        # (see OBS/Insta360) — a friendlier name means "not found".
        PRODUCT_NAME: com.marcotempest.stagewizard.camera
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
    info:
      path: Support/CameraExtensionInfo.plist
      properties:
        CFBundlePackageType: SYSX
        CFBundleName: com.marcotempest.stagewizard.camera
        CFBundleDisplayName: StageWizard Camera
        NSSystemExtensionUsageDescription: The StageWizard Camera lets other apps (Zoom, Teams, OBS) receive StageWizard's show output as a webcam.
        CFBundleShortVersionString: "1.4.0"
        CFBundleVersion: "10"
        NSHumanReadableCopyright: "© 2026 MagicLab AG"
        CMIOExtension:
          CMIOExtensionMachServiceName: Z3U3NKMU2Y.com.marcotempest.stagewizard.camera
    postBuildScripts:
      - script: 'xattr -cr "${CODESIGNING_FOLDER_PATH}" 2>/dev/null || true'
        name: Strip cloud-sync xattrs before codesign
        basedOnDependencyAnalysis: false

  StageWizardTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/StageWizardTests
      - path: Tests/StageWizardTests/Fixtures
        buildPhase: resources
    postBuildScripts:
      - script: 'xattr -cr "${CODESIGNING_FOLDER_PATH}" 2>/dev/null || true'
        name: Strip cloud-sync xattrs before codesign
        basedOnDependencyAnalysis: false
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: StageWizard
